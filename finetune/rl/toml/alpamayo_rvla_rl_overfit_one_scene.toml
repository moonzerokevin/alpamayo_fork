#
# 单条 PAI clip overfit 验证（与 finetune/rl/README.md 本地验证同一拓扑：多卡 FSDP policy + 独立 rollout）。
# 占位符由 scripts/run_rl_overfit_one_scene.sh 替换：
#   __ALPAMAYO_MODEL_DIR__  __ALPAMAYO_RL_OUTPUT_DIR__  __POLICY_DP_SHARD__
#
# GPU：默认 __POLICY_DP_SHARD__=4 时需 4 张 policy + 1 张 rollout = 5×80G（与上游 README 一致）。
# 仅 4 卡时可设 ALPAMAYO_RL_POLICY_DP_SHARD=3（脚本会自动尝试）。

redis = "12800"

[train]
resume = false
epoch = 20
max_num_step = 50
output_dir = "__ALPAMAYO_RL_OUTPUT_DIR__"
epsilon = 1e-6
optm_name = "AdamW"
optm_lr = 2e-6
optm_impl = "fused"
optm_weight_decay = 0.01
optm_betas = [0.9, 0.999]
optm_warmup_steps = 0
optm_grad_norm_clip = 1.0
async_tp_enabled = false
compile = false
param_dtype = "bfloat16"
fsdp_reduce_dtype = "float32"
fsdp_offload = false
fsdp_reshard_after_forward = "default"
train_batch_per_replica = 6
sync_weight_interval = 2
validation_step = 50
validation_batch_per_replica = 2
non_text = true

[validation]
enable = false
freq = 50
batch_size = 2
temperature = 0.6
n_generation = 4

[rollout]
backend = "reasoning_vla_vllm_rollout"
gpu_memory_utilization = 0.75
enable_chunked_prefill = false
n_generation = 8
batch_size = 1
quantization = "none"
seed = 42

[rollout.sampling_config]
temperature = 0.6
top_p = 0.98
repetition_penalty = 1

[policy]
model_name_or_path = "__ALPAMAYO_MODEL_DIR__"
model_max_length = 4096
model_gradient_checkpointing = true

[logging]
logger = ["console", "wandb"]
project_name = "Alpamayo_RL"
experiment_name = "overfit_one_scene"

[train.train_policy]
type = "grpo"
trainer_type = "reasoning_vla_grpo"
dataloader_shuffle = false
dataset.split = "train"
data_dispatch_as_rank_in_mesh = false
temperature = 1.0
epsilon_low = 0.2
epsilon_high = 0.28
lower_bound_ratio = 10.0
kl_beta = 0.0
mu_iterations = 1
mini_batch = 1
min_filter_prefix_tokens = 1
allowed_outdated_steps = 50

[train.ckpt]
enable_checkpoint = true
save_freq = 25
save_mode = "async"
max_keep = 3

[rollout.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 1
pp_size = 1
dp_replicate_size = 1

[policy.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = __POLICY_DP_SHARD__
pp_size = 1
dp_replicate_size = 1

[custom.alpamayo]
idx_rng_enable = false
idx_rng_seed = 1234
idx_rng_debug = false

[custom.alpamayo.reward]
traj_l2_weight = 0.4
comfort_weight = 0.1

[custom.alpamayo.prefetch]
capacity = 6
num_workers = 4
log_level = "info"
log_request_details = false
