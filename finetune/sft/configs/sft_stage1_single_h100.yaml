defaults:
  - sft_stage1
  - _self_

paths:
  output_dir: output_stage1_single_h100

evaluate:
  eval_ckpt: null
  max_eval_steps: 4

trainer:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  dataloader_num_workers: 2
  logging_steps: 1
  save_steps: 25
  save_total_limit: 2
  num_train_epochs: 1
  max_steps: 20
  deepspeed: null
  gradient_checkpointing: true
  ddp_find_unused_parameters: false
